<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.cdnfonts.com/css/sterion" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/color.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/typography.css">
    <script src="scripts/script.js"></script>

    <title>Tension24</title>
    <link rel="shortcut icon" type="image/x-icon" href="assets/logo.svg">
</head>

<body>
    <!-- Navigation Bar and Search Bar-->
    <header>
        <div class="navbar">
            <nav>
                <ul>
                    <li><img src="assets/hamburger_menu.svg" alt="Hamburger Menu Icon"></li>
                    <a href="index.html"><li><img src="assets/logo.svg" alt="Tension24 Logo"></li></a>
                    <a href="shopping-cart.html"><li><img src="assets/shopping_cart.svg" alt="Shopping Cart Icon"></li></a>
                </ul>
            </nav>
        </div>
        
        <div class="container" id="lower-navigation">
            <img src="assets/avatar-icon.svg" alt="Your Profile">
            <img src="assets/heart-icon.svg" alt="Favourites">
            <input type="text" placeholder="Search...">
        </div>

        <div class="categories-menu">
            <a href="product-listing-tennis.html"><h3>TENNIS</h3></a>
            <h3>BADMINTON</h3>
            <h3>SQUASH</h3>
            <h3>PICKLEBALL</h3>
            <h3>STRINGS</h3>
            <a href="product-listing-bags.html"><h3>BAGS</h3></a>
            <h3>SHOES</h3>
            <h3>ACCESSORIES</h3>
        </div>
    </header>

    <main>
        <h2>Categories/Bags</h2>
        <hr>
        <div class="filtering">
            <img src="assets/filter-icon.png" alt="Filter Icon">
            <img src="assets/sort-icon.png" alt="Sort Icon">
        </div>

        <div class="flex-display" id="grid-responsive">
                <figure>
                    <img src="assets/navy_backpack.jpg" alt="Wilson US Open 2025 6 pack">
                    <span><p>Wilson US Open 2025 6 pack</p></span>
                    <p>$189.95</p>
                    <button>Add to Cart</button>
                </figure>

                <figure>
                    <img src="assets/beige_backpack.jpg" alt="Wilson RG 2025 Backpack">
                    <span><p>Wilson RG 2025 Backpack</p></span>
                    <p>$199.95</p>
                    <button>Add to Cart</button>
                </figure>

                <figure>
                    <img src="assets/black_and_yellow_backpack.jpg" alt="Yonex Pro 9 Gray Racquet Bag">
                    <span><p>Yonex Pro 9 Gray Racquet Bag</p></span>
                    <p>$279.95</p>
                    <button>Add to Cart</button>
                </figure>

                <figure>
                    <img src="assets/silver_backpack.jpg" alt="Wilson Shift Super Tour Backpack">
                    <span><p>Wilson Shift Super Tour Backpack</p></span>
                    <p>$179.95</p>
                    <button>Add to Cart</button>
                </figure>
        </div>

        <div class="flex-left" id="grid-responsive">
                <figure>
                    <a href="product-detail-bags.html"><img src="assets/blue_backpack.jpg" alt="Babolat Pure Drive 6 Pack 2025"></a>
                    <a href="product-detail-bags.html"><span><p>Babolat Pure Drive 6 Pack 2025</p></span></a>
                    <p>$299.95</p>
                    <button>Add to Cart</button>
                </figure>

                <figure>
                    <img src="assets/green_backpack.jpg" alt="Wilson Super Tour Blade V9 Backpack">
                    <span><p>Wilson Super Tour Blade V9 Backpack</p></span>
                    <p>$149.95</p>
                    <button>Add to Cart</button>
                </figure>
        </div>

        <h2>Other Categories</h2>
        <div class="flex-display">
            <div class="other-categories">
                <img src="assets/badminton-category.jpg" alt="Badminton Category">
                <img src="assets/squash-category.jpg" alt="Squash Category">
                <img src="assets/pickleball_category.jpg" alt="Pickleball Category">
            </div>
        </div>

    </main>

    <!--Footer at the end of Website-->
    <footer>

        <div class="footer">
            <span><h2>Contact Us</h2></span>

            <div class="footer-contact">
                <div class="footer-address">
                    <p>Address:</p>
                    <p>629 High St Rd, Mt Waverley 3149</p>
                </div>

                <div class="footer-phone">
                    <p>Phone:</p>
                    <p>03 9802 30009</p>
                </div>

                <div class="footer-mobile">
                    <p>Mob ph:</p>
                    <p>0437 889 140</p>
                </div>

                <div class="footer-email">
                    <p>Email:</p>
                    <p>info@tension24.com.au</p>
                </div>
            </div>

            <div class="footer-ending">
                <div class="footer-icons">
                    <img src="assets/instagram-icon.svg" alt="Instagram Logo">
                    <img src="assets/facebook-icon.svg" alt="Facebook Logo">
                    <img src="assets/twitter-x-icon.svg" alt="X (Formerly Twitter) Logo">
                </div>

                <h2>Tension24</h2>
                <p>@2026 Tension24 | All Rights Reserved.</p>
            </div>
        </div>

    </footer>

</html>
