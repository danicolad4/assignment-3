<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.cdnfonts.com/css/sterion" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/color.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/typography.css">
    <script src="scripts/script.js" defer></script>

    <title>Tension24</title>
    <link rel="shortcut icon" type="image/x-icon" href="assets/logo.svg">
</head>

<body>
    <!-- Navigation Bar and Search Bar-->
    <header>
        <div class="navbar">
            <nav>
                <ul>
                    <li><img src="assets/hamburger_menu.svg" alt="Hamburger Menu Icon"></li>
                    <a href="index.html"><li><img src="assets/logo.svg" alt="Tension24 Logo"></li></a>
                    <a href="shopping-cart.html"><li><img src="assets/shopping_cart.svg" alt="Shopping Cart Icon"></li></a>
                </ul>
            </nav>
        </div>
        
        <div class="container" id="lower-navigation">
            <img src="assets/avatar-icon.svg" alt="Your Profile">
            <img src="assets/heart-icon.svg" alt="Favourites">
            <input type="text" placeholder="Search...">
        </div>

        <div class="categories-menu">
            <a href="product-listing-tennis.html"><h3>TENNIS</h3></a>
            <h3>BADMINTON</h3>
            <h3>SQUASH</h3>
            <h3>PICKLEBALL</h3>
            <h3>STRINGS</h3>
            <a href="product-listing-bags.html"><h3>BAGS</h3></a>
            <h3>SHOES</h3>
            <h3>ACCESSORIES</h3>
        </div>
    </header>
    
    <h2>Checkout</h2>
    <hr>

    <section>
        
    </section>

    <article class="overall-payment">
        <div class="checkout">
            <h2>Order Summary</h2>

            <div class="flex-display" id="">
                <!--printed item from cart-->
            </div>

            <hr>
            
            <div class="double-content">
                <span><h2>Total</h2></span>
                <h2 class="total-price">$0</h2>
            </div>
        </div>

        <form action="purchase-confirmation.html" name="checkout-form" id="payment-details">

            <div class="form-group" id="span-two">
                <label for="fname">First Name</label>
                <input type="text" id="fname" name="firstName">
            </div>

            <div class="form-group">
                <label for="lname">Last Name</label>
                <input type="text" id="lname" name="lastName">
            </div>
        
            <div class="form-group" id="span-three">
                <label for="pnumber">Phone Number</label>
                <input type="number" id="pnumber" name="pnumber">
            </div>

            <div class="form-group" id="span-three">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-group" id="span-three">
                <label for="address">Address</label>
                <input type="text" id="address" name="address">
            </div>

            <div class="form-group" id="span-two">
                <label for="state">State</label>
                <select name="state" id="state">
                    <option value="select">Select</option>
                    <option value="NSW">NSW</option>
                    <option value="QLD">QLD</option>
                    <option value="SA">SA</option>
                    <option value="TAS">TAS</option>
                    <option value="VIC">VIC</option>
                    <option value="WA">WA</option>
                </select>
            </div>

            <div class="form-group">
                <label for="pcode">Postal Code</label>
                <input type="number" id="pcode" name="postal">
            </div>

            <div class="form-group" id="span-three">
                <label for="cnumber">Card Number</label>
                <input type="number" id="cnumber" name="cnumber">
            </div>

            <div class="form-group">
                <label for="month">MM</label>
                <input type="number" id="month" name="month">
            </div>

            <div class="form-group">
                <label for="year">YY</label>
                <input type="number" id="year" name="year">
            </div>

            <div class="form-group">
                <label for="cvc">CVC</label>
                <input type="number" id="cvc" name="cvc">
            </div>

            <button onclick="return getValidation()">Purchase</button>
        </form>
    </article>

<!--Footer at the end of Website-->
    <footer>

        <div class="footer">
            <span><h2>Contact Us</h2></span>

            <div class="footer-contact">
                <div class="footer-address">
                    <p>Address:</p>
                    <p>629 High St Rd, Mt Waverley 3149</p>
                </div>

                <div class="footer-phone">
                    <p>Phone:</p>
                    <p>03 9802 30009</p>
                </div>

                <div class="footer-mobile">
                    <p>Mob ph:</p>
                    <p>0437 889 140</p>
                </div>

                <div class="footer-email">
                    <p>Email:</p>
                    <p>info@tension24.com.au</p>
                </div>
            </div>

            <div class="footer-ending">
                <div class="footer-icons">
                    <img src="assets/instagram-icon.svg" alt="Instagram Logo">
                    <img src="assets/facebook-icon.svg" alt="Facebook Logo">
                    <img src="assets/twitter-x-icon.svg" alt="X (Formerly Twitter) Logo">
                </div>

                <h2>Tension24</h2>
                <p>@2026 Tension24 | All Rights Reserved.</p>
            </div>
        </div>

    </footer>

    </body>
    
</html>
