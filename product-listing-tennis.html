<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.cdnfonts.com/css/sterion" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="styles/color.css">

<body>
    <!--Navigation Bar and Search Bar-->
    <header>
        <div class="navbar">
            <nav>
                <ul>
                    <li><img src="assets/hamburger_menu.svg" alt="Hamburger Menu Icon"></li>
                    <a href="index.html"><li><img src="assets/logo.svg" alt="Tension24 Logo"></li></a>
                    <a href="shopping-cart.html"><li><img src="assets/shopping_cart.svg" alt="Shopping Cart Icon"></li></a>
                </ul>
            </nav>
        </div>
        
        <div class="container" id="lower-navigation">
            <img src="assets/avatar-icon.svg" alt="Your Profile">
            <img src="assets/heart-icon.svg" alt="Favourites">
            <input type="text" placeholder="Search...">
        </div>

        <div class="categories-menu">
            <a href="product-listing-tennis.html"><h3>TENNIS</h3></a>
            <h3>BADMINTON</h3>

            <h3>PICKLEBALL</h3>

    <main>
        <!--Product Listing Section-->
        <h2>Categories/Tennis</h2>
        <hr>
        <div class="filtering"> 
            <img src="assets/filter-icon.png" alt="Filter Icon">
            <img src="assets/sort-icon.png" alt="Sort Icon">
        </div>

        <div class="flex-display" id="grid-responsive">
                <figure>
                    <img src="assets/blue_tennis_racquet.jpg" alt="Wilson Ultra 100 v5 Tennis Racquet">
                    <span><p>Wilson Ultra 100 v5 Tennis Racquet</p></span>
                    <p>$399.95</p>
                    <button>Add to Cart</button>
                </figure>

                <figure>
                    <img src="assets/red_shoe.jpg" alt="Yonex Accell AC Junior Tennis shoes">
                    <span><p>Yonex Accell AC Junior Tennis shoes</p></span>
                    <p>$129.95</p>
                    <button>Add to Cart</button>
                </figure>

                <figure>
                    <a href="product-detail-tennis.html"><img src="assets/pink_and_white_shoe.jpg" alt="Asics Gel Dedicate 8  Rose Tennis Shoe"></a>
                    <a href="product-detail-tennis.html"><span><p>Asics Gel Dedicate 8  Rose Tennis Shoe</p></span></a>
                    <p>$139.95</p>
                    <button>Add to Cart</button>
                </figure>

                <figure>
                    <img src="assets/blue_and_black_tennis_racquet.jpg" alt="Wilson Hyper Hammer 2.3 Tennis Racquet">
                    <span><p>Wilson Hyper Hammer 2.3 Tennis Racquet</p></span>
                    <p>$399.95</p>
                    <button>Add to Cart</button>
                </figure>
        </div>

        <div class="flex-left" id="grid-responsive">
                <figure>
                    <img src="assets/teal_tennis_racquet.jpg" alt="Head Novak 25 Junior Tennis Racquet">
                    <span><p>Head Novak 25 Junior Tennis Racquet</p></span>
                    <p>$59.95</p>
                    <button>Add to Cart</button>
                </figure>

                <figure>
                    <img src="assets/tennis_ball_pack.jpg" alt="Wilson Roland Garros Clay Court Tennis Ball">
                    <span><p>Wilson Roland Garros Clay Court Tennis Ball</p></span>
                    <p>$16.95</p>
                    <button>Add to Cart</button>
                </figure>

        </div>

        <h2>Other Categories</h2>
        <div class="flex-display">
            <div class="other-categories">
                <img src="assets/badminton-category.jpg" alt="Badminton Category">
                <img src="assets/squash-category.jpg" alt="Squash Category">
                <img src="assets/pickleball_category.jpg" alt="Pickleball Category">
            </div>
        </div>

    </main>

    <!--Footer at the end of Website-->
    <footer>

        <div class="footer">
            <span><h2>Contact Us</h2></span>

            <div class="footer-contact">
                <div class="footer-address">
                    <p>Address:</p>

                </div>

                <div class="footer-phone">
                    <p>Phone:</p>
                    <p>03 9802 30009</p>
                </div>

                <div class="footer-mobile">
                    <p>Mob ph:</p>
                    <p>0437 889 140</p>
                </div>

                <div class="footer-email">
                    <p>Email:</p>
                    <p>info@tension24.com.au</p>
                </div>
            </div>

            <div class="footer-ending">
                <div class="footer-icons">
                    <img src="assets/instagram-icon.svg" alt="Instagram Logo">
                    <img src="assets/facebook-icon.svg" alt="Facebook Logo">
                    <img src="assets/twitter-x-icon.svg" alt="X (Formerly Twitter) Logo">
                </div>

                <h2>Tension24</h2>
