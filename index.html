<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.cdnfonts.com/css/sterion" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/color.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/typography.css">
    <script src="scripts/script.js"></script>
    <title>Tension24</title>
</head>

<body>
    <header>
        <div class="header">

        </div>
    </header>

    <div class="linear"></div>
    <div class="transparent"></div>

    <main>

        <div class="banner">
            <img src="assets/main-header.png" alt="Main Banner">
            <h1>Tension24</h1>
            <p>"Your go-to place for racquets!"</p>
            <button>Shop</button>
        </div>

        <h2>Categories</h2>
            <div class="bento-display">

            </div>

        <h2>Trending</h2>
            <div class="flex-display">
                <figure>
                    <img src="assets/blue_tennis_racquet.jpg" alt="Wilson Ultra 100 v5 Tennis Racquet">
                    <figcaption>Wilson Ultra 100 v5 Tennis Racquet</figcaption>
                    <p>$399.95</p>
                </figure>

                <figure>
                    <img src="assets/beige_backpack.jpg" alt="Wilson RG 2025 Backpack">
                    <figcaption>Wilson RG 2025 Backpack</figcaption>
                    <p>$199.95</p>
                </figure>

                <figure>
                    <img src="assets/blue_and_white_shoe.jpg" alt="Asics Gel Rocket 12 Mens White Squash Shoe">
                    <figcaption>Asics Gel Rocket 12 Mens White Squash Shoe </figcaption>
                    <p>$139.95</p>
                </figure>

                <figure>
                    <img src="assets/tennis_ball_pack.jpg" alt="Wilson Roland Garros Clay Court Tennis Ball">
                    <figcaption>Wilson Roland Garros Clay Court Tennis Ball</figcaption>
                    <p>$16.95</p>
                </figure>
            </div>

        <h2>Reviews</h2>
            <p>4.8 Stars (152 Reviews)</p>
            <div class="flex-display">
                
            </div>

    </main>

    <footer>

    </footer>

</body>
</html>
